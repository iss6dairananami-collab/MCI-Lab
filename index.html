<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>MCI Companion AI</title>
</head>
<body>

<h1>MCI Companion AI</h1>

<p id="message">
おはようございます！
</p>

<button id="startButton">
🎤 会話を始める
</button>

<div id="chat"></div>

<script>
  document.getElementById('startButton').addEventListener('click', function() {
    document.getElementById('message').textContent = '会話を開始しました！';
    const chat = document.getElementById('chat');
    chat.innerHTML = '<p>こんにちは！何について話しますか？</p>';
  });
</script>

</body>
</html>
