<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>MCI Companion AI</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            max-width: 760px;
            margin: 0 auto;
            padding: 24px;
            background: #f4f7fb;
            color: #222;
        }
        h1 {
            margin-top: 0;
            font-size: 1.9rem;
        }
        #message {
            margin: 0 0 18px;
            font-size: 1.1rem;
        }
        .chat-card {
            background: #ffffff;
            border: 1px solid #dde3ed;
            border-radius: 16px;
            box-shadow: 0 10px 24px rgba(19, 47, 76, 0.08);
            padding: 18px;
            margin-bottom: 18px;
        }
        #features {
            display: grid;
            gap: 12px;
            margin-top: 12px;
        }
        .feature-button {
            width: 100%;
            text-align: left;
            padding: 16px 18px;
            font-size: 1rem;
            border: 1px solid #cfd8e7;
            border-radius: 14px;
            background: #f9fbff;
            cursor: pointer;
            transition: transform 0.12s ease, border-color 0.12s ease, background-color 0.12s ease;
        }
        .feature-button:hover,
        .feature-button:focus {
            border-color: #8da4ff;
            background: #eef3ff;
            transform: translateY(-1px);
            outline: none;
        }
        #startButton {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 14px 20px;
            border: none;
            border-radius: 14px;
            background: #4c7eff;
            color: white;
            font-size: 1rem;
            cursor: pointer;
            transition: background-color 0.15s ease;
        }
        #startButton:hover {
            background: #3f65d1;
        }
    </style>
</head>
<body>

<h1>MCI Companion AI</h1>
<p id="message">おはようございます！</p>

<div id="menu" class="chat-card">
    <p>次の機能から選んでください。タッチ／クリックすると、その機能に移動します。</p>
    <div id="features">
        <button class="feature-button" data-feature="check">🧠 認知機能チェック</button>
        <button class="feature-button" data-feature="history">📜 履歴を見る</button>
        <button class="feature-button" data-feature="notify">👪 家族に通知</button>
    </div>
</div>

<button id="startButton">🎤 会話を始める</button>

<div id="chat" class="chat-card"></div>

<script>
    const message = document.getElementById('message');
    const chat = document.getElementById('chat');
    const featureButtons = document.querySelectorAll('.feature-button');
    const startButton = document.getElementById('startButton');

    function showChat(text) {
        chat.innerHTML = '<p>' + text + '</p>';
    }

    function goFeature(feature) {
        switch (feature) {
            case 'check':
                message.textContent = '認知機能チェックを開始します。';
                showChat('「認知機能チェック」を選びました。
                <br>ここから簡単な質問で状態を確認します。');
                break;
            case 'history':
                message.textContent = '保存された履歴を表示します。';
                showChat('「履歴を見る」を選びました。
                <br>過去の会話や検査結果を一覧表示します。');
                break;
            case 'notify':
                message.textContent = '家族への通知を準備します。';
                showChat('「家族に通知」を選びました。
                <br>家族に送るメッセージを確認して、通知を送信できます。');
                break;
        }
    }

    featureButtons.forEach(button => {
        button.addEventListener('click', () => goFeature(button.dataset.feature));
    });

    startButton.addEventListener('click', () => {
        message.textContent = '会話を開始しました！';
        showChat('こんにちは！何について話しますか？');
    });
</script>

</body>
</html>
